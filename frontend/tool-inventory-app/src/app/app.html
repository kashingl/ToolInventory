@if (showShell()) {
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" opened class="sidenav">
      <mat-toolbar color="primary">
        <span>{{ title }}</span>
      </mat-toolbar>
      <mat-nav-list>
        <a mat-list-item routerLink="/tools" routerLinkActive="active-link">
          <mat-icon matListItemIcon>build</mat-icon>
          <span matListItemTitle>Tools</span>
        </a>
        <a mat-list-item routerLink="/checkouts" routerLinkActive="active-link">
          <mat-icon matListItemIcon>swap_horiz</mat-icon>
          <span matListItemTitle>Check-in / Out</span>
        </a>
        <a mat-list-item routerLink="/maintenance" routerLinkActive="active-link">
          <mat-icon matListItemIcon>build_circle</mat-icon>
          <span matListItemTitle>Maintenance</span>
        </a>
      </mat-nav-list>

      <div class="sidenav-footer">
        @if (authService.currentUser(); as user) {
          <div class="user-info">
            <mat-icon>account_circle</mat-icon>
            <span class="user-name">{{ user.displayName }}</span>
          </div>
          <button mat-button class="logout-btn" (click)="authService.logout()" matTooltip="Sign out">
            <mat-icon>logout</mat-icon>
            Sign Out
          </button>
        }
      </div>
    </mat-sidenav>

    <mat-sidenav-content class="content">
      <router-outlet />
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}

<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon class="title-icon">build</mat-icon>
        Tool Inventory
      </mat-card-title>
      <mat-card-subtitle>Create an account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content [formGroup]="form">
      @if (errorMessage) {
        <div class="error-banner">
          <mat-icon>error_outline</mat-icon>
          {{ errorMessage }}
        </div>
      }

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Display Name</mat-label>
        <input matInput formControlName="displayName" autocomplete="name">
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="new-password">
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-hint>Minimum 8 characters</mat-hint>
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions class="card-actions">
      <button mat-raised-button color="primary" class="full-width" (click)="submit()" [disabled]="form.invalid || loading">
        @if (loading) {
          <mat-spinner diameter="20" />
        } @else {
          Register
        }
      </button>
      <p class="login-link">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>

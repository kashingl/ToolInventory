<div class="page-header">
  <h1>Tools</h1>
  <div class="header-actions">
    <button mat-stroked-button (click)="openScanner()">
      <mat-icon>qr_code_scanner</mat-icon>
      Scan
    </button>
    <mat-divider vertical></mat-divider>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Add Tool
    </button>
  </div>
</div>

<mat-form-field appearance="outline" class="filter-field">
  <mat-label>Filter</mat-label>
  <input matInput (input)="applyFilter($event)" placeholder="Search tools...">
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

<div class="table-container mat-elevation-z2">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let tool">{{ tool.name }}</td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let tool">{{ tool.categoryName ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Location</th>
      <td mat-cell *matCellDef="let tool">{{ tool.location ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="systainer">
      <th mat-header-cell *matHeaderCellDef>Systainer</th>
      <td mat-cell *matCellDef="let tool">{{ tool.systainer ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
      <td mat-cell *matCellDef="let tool">
        <mat-chip [color]="statusColor(tool.status)" highlighted>{{ tool.status }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let tool">
        <button mat-icon-button matTooltip="Edit" (click)="openEdit(tool)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Delete" color="warn" (click)="delete(tool)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
</div>
